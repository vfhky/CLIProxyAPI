name: Sync Upstream

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: feat/embeddings
          fetch-depth: 0
          token: ${{ secrets.GHCR_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fetch upstream
        run: |
          git remote add upstream https://github.com/router-for-me/CLIProxyAPI.git
          git fetch upstream main

      - name: Check for changes
        id: check
        run: |
          if git diff --quiet HEAD upstream/main; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Merge upstream
        id: merge_step
        if: steps.check.outputs.changed == 'true'
        run: |
          git merge upstream/main -m "chore: merge upstream/main"

      - name: Abort merge on failure
        if: failure() && steps.merge_step.outcome == 'failure'
        run: |
          git merge --abort

      - name: Push changes
        if: steps.merge_step.outcome == 'success'
        run: |
          git push https://vfhky:${{ secrets.GHCR_TOKEN }}@github.com/vfhky/CLIProxyAPI.git feat/embeddings

      - name: Notify sync failure
        if: failure()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          format: markdown
          message: |
            ⚠️ *CLIProxyAPI 上游同步失败*
            📦 vfhky/CLIProxyAPI
            🌿 feat/embeddings ← upstream/main
            🔗 [查看日志](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})

      - name: Notify sync success
        if: steps.check.outputs.changed == 'true' && success()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          format: markdown
          message: |
            🔄 *CLIProxyAPI 上游同步完成*
            ✅ upstream/main → feat/embeddings
            🚀 Docker 构建自动触发中…
            🔗 [查看日志](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
