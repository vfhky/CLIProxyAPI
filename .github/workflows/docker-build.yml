name: Docker Build and Push

on:
  push:
    branches:
      - feat/embeddings
  workflow_dispatch:

env:
  IMAGE_NAME: cliproxyapi

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        platform:
          - linux/amd64
          - linux/arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Generate metadata
        id: meta
        run: |
          echo "sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "date=$(date -u +%Y%m%d-%H%M%S)" >> $GITHUB_OUTPUT

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Login to Tencent TCR
        uses: docker/login-action@v3
        with:
          registry: ccr.ccs.tencentyun.com
          username: ${{ secrets.TENCENT_TCR_USERNAME }}
          password: ${{ secrets.TENCENT_TCR_PASSWORD }}

      - name: Build and push platform image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: true
          build-args: |
            VERSION=${{ steps.meta.outputs.sha }}
            COMMIT=${{ steps.meta.outputs.sha }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
          tags: |
            ghcr.io/vfhky/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.sha }}-${{ matrix.platform == 'linux/amd64' && 'amd64' || 'arm64' }}
            docker.io/vfhky/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.sha }}-${{ matrix.platform == 'linux/amd64' && 'amd64' || 'arm64' }}
            ccr.ccs.tencentyun.com/typecodes/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.sha }}-${{ matrix.platform == 'linux/amd64' && 'amd64' || 'arm64' }}

  manifest:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate metadata
        id: meta
        run: |
          echo "sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "date=$(date -u +%Y%m%d-%H%M%S)" >> $GITHUB_OUTPUT

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Login to Tencent TCR
        uses: docker/login-action@v3
        with:
          registry: ccr.ccs.tencentyun.com
          username: ${{ secrets.TENCENT_TCR_USERNAME }}
          password: ${{ secrets.TENCENT_TCR_PASSWORD }}

      - name: Create and push multi-arch manifests
        run: |
          SHA="${{ steps.meta.outputs.sha }}"
          DATE="${{ steps.meta.outputs.date }}"
          for REG in \
            "ghcr.io/vfhky/${IMAGE_NAME}" \
            "docker.io/vfhky/${IMAGE_NAME}" \
            "ccr.ccs.tencentyun.com/typecodes/${IMAGE_NAME}"
          do
            docker buildx imagetools create \
              --tag "${REG}:latest" \
              --tag "${REG}:${SHA}" \
              --tag "${REG}:${DATE}" \
              "${REG}:${SHA}-amd64" \
              "${REG}:${SHA}-arm64"
          done

      - name: Cleanup temporary platform tags
        if: always()
        run: |
          # 删除临时 amd64/arm64 标签，保留 manifest 标签
          echo "Temporary platform tags can be cleaned manually if needed."

  notify:
    runs-on: ubuntu-latest
    needs: manifest
    if: always()
    steps:
      - name: Notify build success
        if: needs.manifest.result == 'success'
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          format: markdown
          message: |
            ✅ *CLIProxyAPI Docker Build Success*
            📦 `ghcr.io` \| `docker.io` \| `tencent-tcr`
            🏷 `latest` `${{ github.sha }}`
            📝 ${{ github.event.head_commit.message || github.event.commits[0].message || 'manual trigger' }}
            🔗 [查看运行详情](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})

      - name: Notify build failure
        if: needs.manifest.result != 'success'
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          format: markdown
          message: |
            ❌ *CLIProxyAPI Docker Build Failed*
            🌿 `feat/embeddings`
            📝 ${{ github.event.head_commit.message || github.event.commits[0].message || 'manual trigger' }}
            🔗 [查看失败日志](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
