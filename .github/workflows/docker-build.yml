name: Docker Build and Push

on:
  push:
    branches:
      - feat/embeddings
  workflow_dispatch:

env:
  IMAGE_NAME: cliproxyapi
  # Registry addresses — 替换 <ns> 为实际的命名空间名
  REGISTRIES: |
    ghcr.io/vfhky/${IMAGE_NAME}
    docker.io/vfhky/${IMAGE_NAME}
    registry.cn-hangzhou.aliyuncs.com/<aliyun-ns>/${IMAGE_NAME}
    ccr.ccs.tencentyun.com/<tencent-ns>/${IMAGE_NAME}

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        platform:
          - linux/amd64
          - linux/arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Generate metadata
        id: meta
        run: |
          echo "sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "date=$(date -u +%Y%m%d-%H%M%S)" >> $GITHUB_OUTPUT

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Login to Aliyun ACR
        uses: docker/login-action@v3
        with:
          registry: registry.cn-hangzhou.aliyuncs.com
          username: ${{ secrets.ALIYUN_ACR_USERNAME }}
          password: ${{ secrets.ALIYUN_ACR_PASSWORD }}

      - name: Login to Tencent TCR
        uses: docker/login-action@v3
        with:
          registry: ccr.ccs.tencentyun.com
          username: ${{ secrets.TENCENT_TCR_USERNAME }}
          password: ${{ secrets.TENCENT_TCR_PASSWORD }}

      - name: Build and push platform image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: true
          build-args: |
            VERSION=${{ steps.meta.outputs.sha }}
            COMMIT=${{ steps.meta.outputs.sha }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
          tags: |
            ghcr.io/vfhky/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.sha }}-${{ matrix.platform == 'linux/amd64' && 'amd64' || 'arm64' }}
            docker.io/vfhky/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.sha }}-${{ matrix.platform == 'linux/amd64' && 'amd64' || 'arm64' }}
            registry.cn-hangzhou.aliyuncs.com/<aliyun-ns>/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.sha }}-${{ matrix.platform == 'linux/amd64' && 'amd64' || 'arm64' }}
            ccr.ccs.tencentyun.com/<tencent-ns>/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.sha }}-${{ matrix.platform == 'linux/amd64' && 'amd64' || 'arm64' }}

  manifest:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Generate metadata
        id: meta
        run: |
          echo "sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "date=$(date -u +%Y%m%d-%H%M%S)" >> $GITHUB_OUTPUT

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Login to Aliyun ACR
        uses: docker/login-action@v3
        with:
          registry: registry.cn-hangzhou.aliyuncs.com
          username: ${{ secrets.ALIYUN_ACR_USERNAME }}
          password: ${{ secrets.ALIYUN_ACR_PASSWORD }}

      - name: Login to Tencent TCR
        uses: docker/login-action@v3
        with:
          registry: ccr.ccs.tencentyun.com
          username: ${{ secrets.TENCENT_TCR_USERNAME }}
          password: ${{ secrets.TENCENT_TCR_PASSWORD }}

      - name: Create and push multi-arch manifests
        run: |
          SHA="${{ steps.meta.outputs.sha }}"
          DATE="${{ steps.meta.outputs.date }}"
          for REG in \
            "ghcr.io/vfhky/${IMAGE_NAME}" \
            "docker.io/vfhky/${IMAGE_NAME}" \
            "registry.cn-hangzhou.aliyuncs.com/<aliyun-ns>/${IMAGE_NAME}" \
            "ccr.ccs.tencentyun.com/<tencent-ns>/${IMAGE_NAME}"
          do
            docker buildx imagetools create \
              --tag "${REG}:latest" \
              --tag "${REG}:${SHA}" \
              --tag "${REG}:${DATE}" \
              "${REG}:${SHA}-amd64" \
              "${REG}:${SHA}-arm64"
          done

      - name: Cleanup temporary platform tags
        if: always()
        run: |
          # 删除临时 amd64/arm64 标签，保留 manifest 标签
          echo "Temporary platform tags can be cleaned manually if needed."

  notify:
    runs-on: ubuntu-latest
    needs: manifest
    if: always()
    steps:
      - name: Notify build success
        if: needs.manifest.result == 'success'
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            ✅ CLIProxyAPI Docker Build Success
            Registry: ghcr.io | docker.io | aliyun-acr | tencent-tcr
            Commit: ${{ github.event.head_commit.message }}

      - name: Notify build failure
        if: needs.manifest.result != 'success'
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            ❌ CLIProxyAPI Docker Build Failed
            Branch: feat/embeddings
            Commit: ${{ github.sha }}
            See: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
