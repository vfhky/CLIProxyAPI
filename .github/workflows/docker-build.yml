name: Docker Build and Push

on:
  push:
    branches:
      - feat/embeddings
  workflow_dispatch:

env:
  IMAGE_NAME: cliproxyapi

jobs:
  start:
    runs-on: ubuntu-latest
    steps:
      - name: Notify build started
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          format: markdown
          message: |
            🚀 *CLIProxyAPI Docker Build Started*
            🌿 `feat/embeddings`
            🏷 `${{ github.sha }}`
            📝 ${{ github.event.head_commit.message || github.event.commits[0].message || 'manual trigger' }}
            🔗 [查看详情](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})

  build:
    runs-on: ubuntu-latest
    needs: start
    strategy:
      matrix:
        platform:
          - linux/amd64
          - linux/arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Generate metadata
        id: meta
        run: |
          echo "sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "date=$(date -u +%Y%m%d-%H%M%S)" >> $GITHUB_OUTPUT

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Login to Tencent TCR
        uses: docker/login-action@v3
        with:
          registry: ccr.ccs.tencentyun.com
          username: ${{ secrets.TENCENT_TCR_USERNAME }}
          password: ${{ secrets.TENCENT_TCR_PASSWORD }}

      - name: Build and push platform image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: true
          build-args: |
            VERSION=${{ steps.meta.outputs.sha }}
            COMMIT=${{ steps.meta.outputs.sha }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
          tags: |
            ghcr.io/vfhky/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.sha }}-${{ matrix.platform == 'linux/amd64' && 'amd64' || 'arm64' }}
            docker.io/vfhky/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.sha }}-${{ matrix.platform == 'linux/amd64' && 'amd64' || 'arm64' }}
            ccr.ccs.tencentyun.com/typecodes/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.sha }}-${{ matrix.platform == 'linux/amd64' && 'amd64' || 'arm64' }}

  manifest:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate metadata
        id: meta
        run: |
          echo "sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "date=$(date -u +%Y%m%d-%H%M%S)" >> $GITHUB_OUTPUT

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Login to Tencent TCR
        uses: docker/login-action@v3
        with:
          registry: ccr.ccs.tencentyun.com
          username: ${{ secrets.TENCENT_TCR_USERNAME }}
          password: ${{ secrets.TENCENT_TCR_PASSWORD }}

      - name: Create and push multi-arch manifests
        run: |
          SHA="${{ steps.meta.outputs.sha }}"
          DATE="${{ steps.meta.outputs.date }}"
          for REG in \
            "ghcr.io/vfhky/${IMAGE_NAME}" \
            "docker.io/vfhky/${IMAGE_NAME}" \
            "ccr.ccs.tencentyun.com/typecodes/${IMAGE_NAME}"
          do
            docker buildx imagetools create \
              --tag "${REG}:latest" \
              --tag "${REG}:${SHA}" \
              --tag "${REG}:${DATE}" \
              "${REG}:${SHA}-amd64" \
              "${REG}:${SHA}-arm64"
          done

      - name: Note: platform tags retained
        if: always()
        run: |
          echo "Temporary platform tags (amd64/arm64) are retained alongside the multi-arch manifest tags."

  notify:
    runs-on: ubuntu-latest
    needs: manifest
    if: always()
    steps:
      - name: Calculate duration
        id: duration
        continue-on-error: true
        run: |
          START_TS=$(date -d "$(curl -s -H 'Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}' \
            -H 'Accept: application/vnd.github+json' \
            '${{ github.api_url }}/repos/${{ github.repository }}/actions/runs/${{ github.run_id }}' \
            | python3 -c 'import json,sys;print(json.load(sys.stdin)["created_at"])')" +%s)
          NOW=$(date +%s)
          ELAPSED=$((NOW - START_TS))
          echo "elapsed=${ELAPSED}s (~$((ELAPSED / 60))m $((ELAPSED % 60))s)" >> $GITHUB_OUTPUT

      - name: Notify build success
        if: needs.manifest.result == 'success'
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          format: markdown
          message: |
            ✅ *CLIProxyAPI Docker Build Success*
            🌿 `feat/embeddings`
            🏷 `latest` `${{ github.sha }}`
            ⏱ ${{ steps.duration.outputs.elapsed || 'N/A' }}
            📝 ${{ github.event.head_commit.message || github.event.commits[0].message || 'manual trigger' }}
            🔗 [查看详情](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})

      - name: Notify build failure
        if: needs.manifest.result == 'failure'
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          format: markdown
          message: |
            ❌ *CLIProxyAPI Docker Build Failed*
            🌿 `feat/embeddings`
            🏷 `${{ github.sha }}`
            ⏱ ${{ steps.duration.outputs.elapsed || 'N/A' }}
            📝 ${{ github.event.head_commit.message || github.event.commits[0].message || 'manual trigger' }}
            🔗 [查看日志](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
